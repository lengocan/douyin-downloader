# Nơi lưu file sau khi tải
path: ./Download/

# Tắt tải các file phụ để thư mục gọn gàng (chỉ lấy video)
music: false
cover: false
json: false

# Không lọc theo thời gian
start_time: ""
end_time: ""

# Tự động lấy Cookie (Playwright của bạn đã hoạt động tốt)
cookies: auto

# Chế độ tải video do kênh đó đăng
mode:
  - post

# Bổ sung giới hạn: Chỉ tải 20 video mới nhất
number:
  post: 20